<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo Forever Diamonds</title>
  <style>
    body {
      margin: 0;
      font-family: "Georgia", serif;
      background-color: #f7f3eb; /* blanco marfil */
      color: #333;
    }
    header {
      text-align: center;
      padding: 30px 10px;
      border-bottom: 1px solid #e0d6c8;
    }
    header h1 {
      margin: 0;
      letter-spacing: 3px;
      font-size: 26px;
    }
    header p {
      margin: 5px 0 0;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #8a7a5a;
    }
    .contenedor {
      max-width: 1100px;
      margin: 30px auto 50px;
      padding: 0 15px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 25px;
    }
    .producto {
      background: #fff;
      border: 1px solid #e5ddcf;
      padding: 18px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.03);
    }
    .producto img {
      width: 100%;
      height: auto;
      display: block;
      margin-bottom: 12px;
    }
    .producto h3 {
      margin: 0 0 5px;
      font-size: 16px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .producto p {
      margin: 3px 0;
      font-size: 13px;
    }
    .precio {
      margin-top: 8px;
      font-weight: bold;
      font-size: 14px;
    }
    .codigo {
      font-size: 11px;
      color: #777;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .boton {
      margin-top: 12px;
    }
    .boton button {
      background-color: #d4af37; /* dorado */
      color: #fff;
      border: none;
      padding: 8px 18px;
      font-size: 13px;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
    }
    .boton button:hover {
      background-color: #b8922f;
    }
  </style>
</head>
<body>
  <header>
    <h1>FOREVER DIAMONDS</h1>
    <p>Catálogo de joyería · Colección inicial</p>
  </header>

  <div id="productos" class="contenedor"></div>

  <script>
    fetch('productos.json')
      .then(response => response.json())
      .then(productos => {
        const contenedor = document.getElementById('productos');
        productos.forEach(p => {
          const item = document.createElement('div');
          item.className = 'producto';
          item.innerHTML = `
            <img src="images/${p.imagen}" alt="${p.nombre}">
            <div class="codigo">${p.codigo || ''}</div>
            <h3>${p.nombre}</h3>
            <p>${p.descripcion || ''}</p>
            <p class="precio">USD $${p.precio}</p>
            <div class="boton">
              <button>Añadir al carrito</button>
            </div>
          `;
          contenedor.appendChild(item);
        });
      })
      .catch(err => {
        console.error('Error cargando productos:', err);
      });
  </script>
</body>
</html>
